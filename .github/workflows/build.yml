name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't kill the other platforms when one fails — usually the failure is
      # platform-specific and seeing all three results helps diagnose it.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            bin: crowfly
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            bin: crowfly
          - os: macos-13
            label: macos-x86_64
            target: x86_64-apple-darwin
            bin: crowfly
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            bin: crowfly.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Per-target key so the four matrix legs don't fight over the cache.
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Test (release)
        run: cargo test --release --locked --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: crowfly-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error
          retention-days: 30
